<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirShare | 1TB Cloud Drop</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: var(--card); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        h2 { color: var(--accent); margin-bottom: 1rem; }
        input[type="file"] { margin: 1.5rem 0; color: #94a3b8; width: 100%; }
        #prog-container { width: 100%; background: #334155; height: 10px; border-radius: 5px; display: none; margin: 1rem 0; overflow: hidden; }
        #prog-bar { background: var(--accent); width: 0%; height: 100%; }
        button { background: var(--accent); color: var(--bg); border: none; padding: 1rem; border-radius: 0.5rem; font-weight: bold; width: 100%; cursor: pointer; }
        #status { margin-top: 1rem; font-size: 0.8rem; color: var(--accent); }
    </style>
</head>
<body>

<div class="box">
    <h2>AirShare</h2>
    <input type="file" id="fileInput">
    <button id="uploadBtn" onclick="upload()">Start Upload</button>
    <div id="prog-container"><div id="prog-bar"></div></div>
    <div id="status">Ready</div>
</div>

<script>
// --- CONFIGURATION ---
const ACCESS_TOKEN = "INITIAL_TOKEN_HERE"; 
const FOLDER_ID = "1pKHESPAG_dO7sonRCGZNKSQyAtemVYVo";

async function upload() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return alert("Select a file first");

    const btn = document.getElementById('uploadBtn');
    const status = document.getElementById('status');
    const bar = document.getElementById('prog-bar');
    const container = document.getElementById('prog-container');

    btn.disabled = true;
    container.style.display = 'block';
    status.innerText = "Initializing...";

    const metadata = {
        name: file.name,
        parents: [FOLDER_ID]
    };

    const formData = new FormData();
    formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    formData.append('file', file);

    try {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
        xhr.setRequestHeader('Authorization', 'Bearer ' + ACCESS_TOKEN);

        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
                const p = Math.round((e.loaded / e.total) * 100);
                bar.style.width = p + '%';
                status.innerText = `Uploading: ${p}%`;
            }
        };

        xhr.onload = () => {
            if (xhr.status === 200) {
                status.innerText = "✅ Upload Complete!";
            } else {
                status.innerText = "❌ Error: Token may be expired. Run GitHub Action.";
            }
            btn.disabled = false;
        };

        xhr.send(formData);
    } catch (err) {
        status.innerText = "System Error: " + err.message;
        btn.disabled = false;
    }
}
</script>
</body>
</html>
